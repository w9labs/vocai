    <script>
        // Google Translate TTS via backend proxy (no CORS issues)
        function speakText(text) {
            if (!text) return;
            const audio = new Audio('/api/tts?text=' + encodeURIComponent(text));
            audio.play().catch(e => console.warn('TTS playback error:', e));
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/flashcards', { credentials: 'include' });
                if (!res.ok) throw new Error('Failed to load flashcards');
                const data = await res.json();
                const grid = document.getElementById('flashcards-grid');

                if (!data.cards || data.cards.length === 0) {
                    grid.innerHTML = '<div class="card text-center" style="opacity:0.6; grid-column:1/-1; padding:var(--space-2xl)"><h3>No flashcards yet</h3><p class="mt-sm text-secondary">Generate your first set with AI</p><a href="/flashcards/new" class="btn btn--primary mt-md">✨ Generate Flashcards</a></div>';
                    return;
                }

                grid.innerHTML = data.cards.map(c => `
                    <div class="card" style="overflow:hidden">
                        ${c.image_url ? `<div style="background:var(--bg-elevated); min-height:160px; display:flex; align-items:center; justify-content:center">
                            <img src="${c.image_url}" alt="${c.word}" style="width:100%; max-height:256px; object-fit:cover" loading="lazy" onerror="this.parentElement.innerHTML='<p style=\\'color:var(--text-muted); padding:var(--space-lg)\\'>🖼️ Image unavailable</p>'" />
                        </div>` : '<div style="background:var(--bg-elevated); min-height:160px; display:flex; align-items:center; justify-content:center"><p style="color:var(--text-muted)">🖼️ No image</p></div>'}
                        <div style="padding:var(--space-md)">
                            <div class="flex justify-between items-center">
                                <h3 style="color:var(--primary-light); margin:0">${c.word}</h3>
                                <button class="btn btn--secondary btn--sm" onclick="speakText('${(c.example_sentence || c.word).replace(/'/g, "\\'")}')" title="Listen">🔊</button>
                            </div>
                            ${c.phonetic ? `<p class="mono" style="font-size:.85rem; color:var(--text-muted)">${c.phonetic}</p>` : ''}
                            ${c.part_of_speech ? `<span class="badge badge--info">${c.part_of_speech}</span>` : ''}
                            <p class="mt-sm" style="color:var(--text-primary)">${c.definition}</p>
                            ${c.example_sentence ? `<p class="mt-sm" style="color:var(--secondary); font-style:italic; font-size:.9rem">"${c.example_sentence}"</p>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                console.error('Failed to load flashcards:', e);
                document.getElementById('flashcards-grid').innerHTML = '<div class="card text-center" style="opacity:0.6; grid-column:1/-1"><p>Failed to load. <a href="/login">Login</a> to view your cards.</p></div>';
            }
        });
    </script>
