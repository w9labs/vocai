<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards — Vocai</title>
    <link rel="icon" type="image/svg+xml" href="/w9-logo/logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/vocai.css">
</head>
<body>
    <div class="page-wrapper">
        <nav class="nav">
            <div class="container nav__inner">
                <a href="/" class="nav__logo"><img src="/w9-logo/workmark-transparent.svg" alt="Vocai" /><span>Vocai</span></a>
                <ul class="nav__links">
                    <li><a href="/dashboard" class="nav__link">Dashboard</a></li>
                    <li><a href="/flashcards" class="nav__link" style="color:var(--secondary)">Flashcards</a></li>
                    <li><a href="/islands" class="nav__link">Islands</a></li>
                    <li><a href="/review" class="nav__link">Review</a></li>
                    <li><a href="/logout" class="btn btn--secondary btn--sm">Logout</a></li>
                </ul>
            </div>
        </nav>

        <main>
            <div class="container">
                <div class="flex justify-between items-center mb-xl">
                    <div><h1>📇 Your Flashcards</h1><p class="text-secondary">Study and manage your vocabulary</p></div>
                    <a href="/flashcards/new" class="btn btn--primary">✨ Generate AI Cards</a>
                </div>

                <div id="flashcards-grid" class="grid grid--2col">
                    <div class="card text-center" style="opacity:0.6; grid-column:1/-1; padding:var(--space-2xl)">
                        <div class="loading"><div class="loading__spinner"></div><p>Loading flashcards...</p></div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container footer__inner">
                <div class="footer__logo"><img src="/w9-logo/workmark-transparent.svg" alt="W9 Labs" /><span>Built with 💜 by W9 Labs</span></div>
            </div>
        </footer>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/flashcards', { credentials: 'include' });
                const data = await res.json();
                const grid = document.getElementById('flashcards-grid');

                if (!data.cards || data.cards.length === 0) {
                    grid.innerHTML = '<div class="card text-center" style="opacity:0.6; grid-column:1/-1; padding:var(--space-2xl)"><h3>No flashcards yet</h3><p class="mt-sm text-secondary">Generate your first set with AI</p><a href="/flashcards/new" class="btn btn--primary mt-md">✨ Generate Flashcards</a></div>';
                    return;
                }

                grid.innerHTML = data.cards.map(c => `
                    <div class="card">
                        ${c.image_url ? `<img src="${c.image_url}" alt="${c.word}" style="width:100%; border-radius:var(--radius-md); margin-bottom:var(--space-md)" loading="lazy" onerror="this.style.display='none'" />` : ''}
                        <h3 style="color:var(--primary-light)">${c.word}</h3>
                        ${c.phonetic ? `<p class="mono" style="font-size:.85rem">${c.phonetic}</p>` : ''}
                        ${c.part_of_speech ? `<span class="badge badge--info">${c.part_of_speech}</span>` : ''}
                        <p class="mt-sm">${c.definition}</p>
                        ${c.example_sentence ? `<p class="mt-sm" style="color:var(--secondary); font-style:italic; font-size:.9rem">"${c.example_sentence}"</p>` : ''}
                        ${c.tts_url ? `<button class="btn btn--secondary btn--sm mt-sm" onclick="this.disabled=true; new Audio('${c.tts_url}').play(); setTimeout(()=>this.disabled=false, 3000)">🔊 Listen</button>` : ''}
                    </div>
                `).join('');
            } catch(e) {
                console.error('Failed to load flashcards:', e);
                document.getElementById('flashcards-grid').innerHTML = '<div class="card text-center" style="opacity:0.6; grid-column:1/-1"><p>Failed to load. <a href="/login">Login</a> to view your cards.</p></div>';
            }
        });
    </script>
</body>
</html>
