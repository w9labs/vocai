<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your vocabulary flashcards — study, review, and manage your word collection.">
    <meta name="robots" content="noindex, nofollow">
    <title>Flashcards — Vocai</title>
    <link rel="icon" type="image/svg+xml" href="/w9-logo/logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/vocai.css">
</head>
<body>
    <div class="page-wrapper">
        <nav class="nav">
            <div class="container nav__inner">
                <a href="/" class="nav__logo">
                    <img src="/w9-logo/workmark-transparent.svg" alt="Vocai" />
                    <span>Vocai</span>
                </a>
                <ul class="nav__links">
                    <li><a href="/dashboard" class="nav__link">Dashboard</a></li>
                    <li><a href="/flashcards" class="nav__link" style="color:var(--secondary)">Flashcards</a></li>
                    <li><a href="/islands" class="nav__link">Islands</a></li>
                    <li><a href="/review" class="nav__link">Review</a></li>
                    <li><a href="/logout" class="btn btn--secondary btn--sm">Logout</a></li>
                </ul>
            </div>
        </nav>

        <main>
            <div class="container">
                <div class="flex justify-between items-center mb-xl">
                    <div>
                        <h1>📇 Your Flashcards</h1>
                        <p class="text-secondary">Study and manage your vocabulary collection</p>
                    </div>
                    <div class="flex gap-sm">
                        <a href="/flashcards/new" class="btn btn--primary">✨ Generate AI Cards</a>
                    </div>
                </div>

                <div id="flashcards-grid" class="grid grid--3col">
                    <!-- Cards loaded by JS -->
                    <div class="card text-center" style="opacity:0.6; grid-column:1/-1; padding:var(--space-2xl)">
                        <h3>No flashcards yet</h3>
                        <p class="mt-sm text-secondary">Generate your first set with AI to get started</p>
                        <a href="/flashcards/new" class="btn btn--primary mt-md">✨ Generate Flashcards</a>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container footer__inner">
                <div class="footer__logo">
                    <img src="/w9-logo/workmark-transparent.svg" alt="W9 Labs" />
                    <span>Built with 💜 by W9 Labs</span>
                </div>
            </div>
        </footer>
    </div>
    <script src="/assets/js/vocai.js"></script>
</body>
</html>
