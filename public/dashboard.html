<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Vocai</title>
    <link rel="icon" type="image/svg+xml" href="/w9-logo/logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/vocai.css?v=2">
</head>
<body>
    <div class="page-wrapper">
        <nav class="nav">
            <div class="container nav__inner">
                <a href="/" class="nav__logo"><img src="/w9-logo/workmark-transparent.svg" alt="Vocai" /><span>Vocai</span></a>
                <ul class="nav__links">
                    <li><a href="/dashboard" class="nav__link" style="color:var(--secondary)">Dashboard</a></li>
                    <li><a href="/flashcards" class="nav__link">Flashcards</a></li>
                    <li><a href="/islands" class="nav__link">Islands</a></li>
                    <li><a href="/review" class="nav__link">Review</a></li>
                    <li><a href="/logout" class="btn btn--secondary btn--sm">Logout</a></li>
                </ul>
            </div>
        </nav>

        <main>
            <div class="container">
                <h1>Welcome back 👋</h1>

                <div class="grid grid--4col mb-xl">
                    <div class="stats-card"><div class="stats-card__value" id="stat-due" style="color:var(--warning)">—</div><div class="stats-card__label">Cards Due</div></div>
                    <div class="stats-card"><div class="stats-card__value" id="stat-total" style="color:var(--primary-light)">—</div><div class="stats-card__label">Total Cards</div></div>
                    <div class="stats-card"><div class="stats-card__value" id="stat-mastered" style="color:var(--success)">—</div><div class="stats-card__label">Mastered</div></div>
                    <div class="stats-card"><div class="stats-card__value" id="stat-streak" style="color:var(--voxel-yellow)">—</div><div class="stats-card__label">Day Streak 🔥</div></div>
                </div>

                <div class="card mb-xl">
                    <h2>Quick Actions</h2>
                    <div class="grid grid--3col mt-md">
                        <a href="/review" class="btn btn--primary btn--lg">🎯 Start Review</a>
                        <a href="/flashcards/new" class="btn btn--secondary btn--lg">✨ AI Flashcards</a>
                        <a href="/islands" class="btn btn--secondary btn--lg">🏝️ Vocabulary Islands</a>
                    </div>
                </div>

                <div class="card">
                    <h2>📚 Due for Review</h2>
                    <div id="due-cards" class="mt-md">
                        <p class="text-secondary">Loading...</p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container footer__inner">
                <div class="footer__logo"><img src="/w9-logo/workmark-transparent.svg" alt="W9 Labs" /><span>Built with 💜 by W9 Labs</span> · <a href="https://pollinations.ai" target="_blank" rel="noopener">Pollinations</a></div>
            </div>
        </footer>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const s = await (await fetch('/stats')).json();
                document.getElementById('stat-due').textContent = s.due_count ?? 0;
                document.getElementById('stat-total').textContent = s.total_cards ?? 0;
                document.getElementById('stat-mastered').textContent = s.mastered_words ?? 0;
                document.getElementById('stat-streak').textContent = s.current_streak ?? 0;

                // Load due cards
                const dueCount = s.due_count ?? 0;
                const dueEl = document.getElementById('due-cards');
                if (dueCount === 0) {
                    dueEl.innerHTML = '<p class="text-secondary">No cards due for review. Generate some flashcards to get started!</p><a href="/flashcards/new" class="btn btn--primary mt-md">✨ Generate Flashcards</a>';
                } else {
                    dueEl.innerHTML = `<p><a href="/review" class="btn btn--primary">🎯 Review ${dueCount} cards now</a></p>`;
                }
            } catch(e) {
                console.error('Failed to load dashboard:', e);
                document.getElementById('due-cards').innerHTML = '<p class="text-secondary">Please <a href="/login">login</a> to see your dashboard.</p>';
            }
        });
    </script>
</body>
</html>
