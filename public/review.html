<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review — Vocai</title>
    <link rel="icon" type="image/svg+xml" href="/w9-logo/logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/vocai.css">

<body>
    <div class="page-wrapper">
        <nav class="nav">
            <div class="container nav__inner">
                <a href="/" class="nav__logo"><img src="/w9-logo/workmark-transparent.svg" alt="Vocai" /><span>Vocai</span></a>
                <ul class="nav__links">
                    <li><a href="/dashboard" class="nav__link">Dashboard</a></li>
                    <li><a href="/flashcards" class="nav__link">Flashcards</a></li>
                    <li><a href="/islands" class="nav__link">Islands</a></li>
                    <li><a href="/review" class="nav__link" style="color:var(--secondary)">Review</a></li>
                    <li><a href="/logout" class="btn btn--secondary btn--sm">Logout</a></li>
                </ul>
            </div>
        </nav>

        <main>
            <div class="container">
                <div class="flex justify-between items-center mb-lg">
                    <div>
                        <h1>🎯 Review Session</h1>
                        <p class="text-secondary">SM-2 + Leitner spaced repetition</p>
                    </div>
                    <div class="badge badge--info"><span id="cards-left">—</span> remaining</div>
                </div>

                <div id="flashcard-container">
                    <div class="card text-center" style="padding:var(--space-2xl); min-height:280px; display:flex; flex-direction:column; align-items:center; justify-content:center">
                        <div class="loading"><div class="loading__spinner"></div><p>Loading review session...</p></div>
                    </div>
                </div>

                <div id="review-controls" class="review-buttons mt-lg" style="display:none">
                    <button class="review-btn review-btn--again" onclick="submitAnswer(0)">Again<br><small>1m</small></button>
                    <button class="review-btn review-btn--hard" onclick="submitAnswer(2)">Hard<br><small>3d</small></button>
                    <button class="review-btn review-btn--good" onclick="submitAnswer(4)">Good<br><small>7d</small></button>
                    <button class="review-btn review-btn--easy" onclick="submitAnswer(5)">Easy<br><small>30d</small></button>
                </div>

                <!-- Progress -->
                <div class="mt-xl">
                    <div style="background:var(--bg-elevated); border-radius:var(--radius-md); height:8px; overflow:hidden">
                        <div id="progress" style="background:linear-gradient(90deg,var(--primary),var(--secondary)); height:100%; width:0%; transition:width .3s"></div>
                    </div>
                    <p class="text-center text-secondary mt-sm"><span id="done">0</span> reviewed</p>
                </div>

                <!-- Session stats -->
                <div class="grid grid--3col mt-xl">
                    <div class="stats-card"><div class="stats-card__value" id="stat-correct" style="color:var(--success)">0</div><div class="stats-card__label">Correct ✓</div></div>
                    <div class="stats-card"><div class="stats-card__value" id="stat-wrong" style="color:var(--error)">0</div><div class="stats-card__label">Again ✗</div></div>
                    <div class="stats-card"><div class="stats-card__value" id="stat-acc">0%</div><div class="stats-card__label">Accuracy</div></div>
                </div>
            </div>
        </main>

            </div>
        </footer>
    </div>
    <script>
        let currentCard = null;
        let stats = { correct: 0, wrong: 0, total: 0 };
        let startTime = Date.now();

        function speakText(text) {
            if (!text) return;
            new Audio('/api/tts?text=' + encodeURIComponent(text)).play().catch(()=>{});
        }

        function updateStats() {
            document.getElementById('stat-correct').textContent = stats.correct;
            document.getElementById('stat-wrong').textContent = stats.wrong;
            document.getElementById('stat-acc').textContent = stats.total ? Math.round(stats.correct/stats.total*100)+'%' : '0%';
            document.getElementById('done').textContent = stats.total;
        }

        function flipCard() {
            const front = document.getElementById('card-front');
            const back = document.getElementById('card-back');
            if (!front || !back) return;
            const isFlipped = front.classList.contains('hidden');
            front.classList.toggle('hidden');
            back.classList.toggle('hidden');
            document.getElementById('review-controls').style.display = isFlipped ? 'none' : 'grid';
        }

        async function loadNextCard() {
            try {
                const res = await fetch('/api/review/next', { credentials: 'include' });
                const card = await res.json();

                if (card.done) {
                    document.getElementById('flashcard-container').innerHTML =
                        '<div class="card text-center" style="padding:var(--space-2xl)"><h2>🎉 Review Complete!</h2><p class="mt-md text-secondary">You reviewed ' + stats.total + ' cards with ' + document.getElementById('stat-acc').textContent + ' accuracy.</p><a href="/dashboard" class="btn btn--primary mt-md">Back to Dashboard</a></div>';
                    document.getElementById('review-controls').style.display = 'none';
                    document.getElementById('cards-left').textContent = '0';
                    return;
                }

                currentCard = card;
                const container = document.getElementById('flashcard-container');
                container.innerHTML = `
                    <div class="flashcard" onclick="flipCard()" style="cursor:pointer">
                        <div class="flashcard__front" id="card-front">
                            ${card.image_url ? `<img src="${card.image_url}" alt="${card.word}" class="flashcard__image" style="max-height:200px;margin-bottom:var(--space-md)" />` : ''}
                            <div class="flashcard__word">${card.word}</div>
                            ${card.phonetic ? `<div class="flashcard__phonetic">${card.phonetic}</div>` : ''}
                            ${card.part_of_speech ? `<span class="badge badge--info">${card.part_of_speech}</span>` : ''}
                            <p class="mt-md text-secondary">Click to reveal definition</p>
                        </div>
                        <div class="flashcard__back hidden" id="card-back">
                            <div class="flashcard__definition">${card.definition}</div>
                            ${card.example_sentence ? `<div class="flashcard__example">"${card.example_sentence}"</div>` : ''}
                            <button class="btn btn--secondary btn--sm mt-md" onclick="event.stopPropagation(); speakText('${(card.example_sentence || card.word).replace(/'/g, "\\'")}')">🔊 Listen</button>
                        </div>
                    </div>`;
                document.getElementById('review-controls').style.display = 'none';
                document.getElementById('cards-left').textContent = '...';
            } catch(e) {
                console.error('Failed to load card:', e);
            }
        }

        async function submitAnswer(quality) {
            if (!currentCard) return;
            stats.total++;
            if (quality >= 3) stats.correct++; else stats.wrong++;
            updateStats();

            try {
                await fetch('/api/review/answer', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        flashcard_id: currentCard.id,
                        quality: quality,
                        response_time_ms: Date.now() - startTime,
                    }),
                });
                startTime = Date.now();
                loadNextCard();
            } catch(e) {
                console.error('Failed to submit answer:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', loadNextCard);
    </script>
</body>
